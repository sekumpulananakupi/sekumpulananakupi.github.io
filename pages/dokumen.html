<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Google tag (gtag.js) -->

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
</head>

<body>
  <header class="site-header">
      <div data-component="navbar"></div>
  </header>

  <main class="container dokumen-page">
  <section class="dokumen-hero">
    <div>
      <p class="eyebrow">Referensi Kampus</p>
      <h1>Dokumen Penting Kampus</h1>
      <p>
        Kumpulan dokumen akademik, panduan, surat, dan referensi penting untuk mahasiswa UPI.
      </p>
    </div>

    <div class="dokumen-hero-card">
      <span id="dokumenTotal">0</span>
      <small>dokumen tersedia</small>
    </div>
  </section>

  <section class="dokumen-toolbar">
    <div class="dokumen-search-wrap">
      <i class="fas fa-search"></i>
      <input
        type="search"
        id="dokumenSearch"
        placeholder="Cari dokumen, kategori, atau kata kunci..."
      />
    </div>

    <select id="dokumenKategoriFilter">
      <option value="all">Semua Kategori</option>
    </select>

    <select id="dokumenSort">
      <option value="az">Urut A-Z</option>
      <option value="za">Urut Z-A</option>
      <option value="kategori">Kategori</option>
    </select>
  </section>

  <div class="dokumen-result-row">
    <p id="dokumenResultInfo">Memuat dokumen...</p>
  </div>

  <div class="category-chip-bar dokumen-chip-bar" id="dokumenCategoryChips"></div>

  <div class="dokumen-grid" id="dokumenList"></div>
</main>
  
  <footer class="footer">
    <div class="container">
      <p>© 2026 Sekumpulan Anak UPI. Dibuat untuk komunitas mahasiswa.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/cache.js"></script>
  <script src="../modules/dokumen/dokumen.js"></script>
  <script src="../assets/js/menu.js"></script>

</body>
</html>
