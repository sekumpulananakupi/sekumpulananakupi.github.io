<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Asisten AI - SA UPI</title>

    <meta name="description" content="Asisten AI SA UPI untuk membantu menjawab pertanyaan seputar Universitas Pendidikan Indonesia.">

    <!-- CSS Website -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- CSS AI -->
    <link rel="stylesheet" href="../assets/css/ai-chat.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header class="site-header">
        <div data-component="navbar"></div>
    </header>

    <!-- Hero -->

    <section class="container">

        <div class="ai-hero">

            <div class="badge">
                🤖 AI Assistant
            </div>

            <h1>
                Tanya Asisten SA UPI
            </h1>

            <p>
                Tanyakan apa saja tentang UPI, jurusan, UKT, SNBP, SNBT,
                mahasiswa baru, beasiswa, organisasi, maupun kehidupan kampus.
            </p>

        </div>

    </section>

    <!-- Chat -->

    <section class="container">

        <div class="ai-card">

            <div id="chatBox" class="chat-box">

                <div class="message bot">

                    Halo 👋

                    <br><br>

                    Saya Asisten AI SA UPI.

                    <br><br>

                    Silakan ajukan pertanyaan apa pun.

                </div>

            </div>

            <div class="chat-input">

                <textarea
                    id="userInput"
                    placeholder="Contoh: Berapa UKT Pendidikan Kimia?"></textarea>

                <button id="sendBtn">

                    <i class="fas fa-paper-plane"></i>

                </button>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="footer">

        <div class="container">

            © 2026 Sekumpulan Anak UPI

        </div>

    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/ai-chat.js"></script>

</body>
</html>
