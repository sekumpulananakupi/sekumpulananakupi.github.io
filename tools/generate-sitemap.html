<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Generate Sitemap SA UPI</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Tool internal untuk membuat sitemap Sekumpulan Anak UPI." />
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>
  <h1>Generate Sitemap</h1>
  <button id="generateBtn">Generate Sitemap</button>
  <pre id="output"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://rozfgvucyiwqqmmrmbph.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KL8Jcb1hEzU-kAZiOMYWFg_hupftFmq";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const SITE_URL = "https://anakupi.my.id";

    function today() {
      return new Date().toISOString().split("T")[0];
    }

    function escapeXml(text) {
  return String(text).replace(/[<>&'"]/g, char => ({
    "<": "&lt;",
    ">": "&gt;",
    "&": "&amp;",
    "'": "&apos;",
    '"': "&quot;"
  }[char]));
}

function urlItem(loc, priority = "0.8", changefreq = "weekly") {
  return `
  <url>
    <loc>${escapeXml(loc)}</loc>
    <lastmod>${today()}</lastmod>
    <changefreq>${changefreq}</changefreq>
    <priority>${priority}</priority>
  </url>`;
}
    
    async function generateSitemap() {
      const output = document.getElementById("output");

      const urls = [];

      urls.push(urlItem(`${SITE_URL}/`, "1.0", "daily"));
      urls.push(urlItem(`${SITE_URL}/pages/jurusan.html`, "0.9", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/bandingkan-jurusan.html`, "0.9", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/lowongan.html`, "0.85", "daily"));
      urls.push(urlItem(`${SITE_URL}/pages/info.html`, "0.85", "daily"));
      urls.push(urlItem(`${SITE_URL}/pages/wiki.html`, "0.85", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/kalender-akademik.html`, "0.8", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/maba.html`, "0.8", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/dokumen.html`, "0.75", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/faq.html`, "0.75", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/search.html`, "0.65", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/kategori.html`, "0.65", "weekly"));
      urls.push(urlItem(`${SITE_URL}/pages/asisten-ai.html`, "0.65", "monthly"));
      urls.push(urlItem(`${SITE_URL}/pages/komunitas.html`, "0.6", "monthly"));
      urls.push(urlItem(`${SITE_URL}/pages/tentang.html`, "0.6", "monthly"));
      urls.push(urlItem(`${SITE_URL}/pages/hubungi-kami.html`, "0.6", "monthly"));

      const { data: jurusan } = await supabaseClient
        .from("jurusan")
        .select("id");

      (jurusan || []).forEach(item => {
        urls.push(
          urlItem(`${SITE_URL}/pages/jurusan-detail.html?id=${item.id}`, "0.9", "weekly")
        );
      });

      const tables = [
        { name: "informasi_kampus", type: "info" },
        { name: "wiki_kampus", type: "wiki" },
        { name: "lowongan_kerja", type: "job" }
      ];

      for (const table of tables) {
        const { data } = await supabaseClient
          .from(table.name)
          .select("id");

        (data || []).forEach(item => {
          urls.push(
            urlItem(`${SITE_URL}/pages/post.html?type=${table.type}&id=${item.id}`, "0.8", "weekly")
          );
        });
      }

      const sitemap = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
${urls.join("")}
</urlset>`;

      output.textContent = sitemap;
    }

    document.getElementById("generateBtn").addEventListener("click", generateSitemap);
  </script>
</body>
</html>
