<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Halaman Tidak Ditemukan - SA UPI</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    .not-found-page {
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .12), transparent 35%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, .14), transparent 35%);
    }

    .not-found-card {
      width: min(100%, 860px);
      text-align: center;
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 32px;
      padding: 56px 32px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      overflow: hidden;
      position: relative;
    }

    .not-found-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(37,99,235,.08), transparent 45%);
      pointer-events: none;
    }

    .not-found-content {
      position: relative;
      z-index: 1;
    }

    .not-found-icon {
      width: 92px;
      height: 92px;
      margin: 0 auto 20px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: #fff;
      font-size: 42px;
      box-shadow: 0 18px 34px rgba(37, 99, 235, .28);
      animation: floatIcon 3s ease-in-out infinite;
    }

    .not-found-code {
      margin: 0;
      font-size: clamp(76px, 15vw, 160px);
      line-height: .9;
      font-weight: 900;
      letter-spacing: -8px;
      background: linear-gradient(135deg, #1d4ed8, #38bdf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .not-found-title {
      margin: 18px 0 12px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.05;
      color: #0f172a;
      letter-spacing: -1.4px;
    }

    .not-found-desc {
      max-width: 590px;
      margin: 0 auto 28px;
      color: #64748b;
      font-size: 17px;
      line-height: 1.75;
    }

    .not-found-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 34px;
    }

    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      transition: .2s ease;
    }

    .nf-btn-primary {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, .22);
    }

    .nf-btn-secondary {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }

    .nf-btn:hover {
      transform: translateY(-3px);
    }

    .not-found-search {
      max-width: 520px;
      margin: 0 auto 34px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
    }

    .not-found-search input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      padding: 10px 8px 10px 14px;
      font-size: 15px;
      color: #0f172a;
    }

    .not-found-search button {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: #0f172a;
      color: #fff;
      cursor: pointer;
      transition: .2s ease;
    }

    .not-found-search button:hover {
      transform: scale(1.05);
      background: #2563eb;
    }

    .quick-links-title {
      margin: 0 0 16px;
      font-weight: 900;
      color: #0f172a;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
    }

    .quick-link {
      padding: 18px 12px;
      border-radius: 20px;
      background: #fff;
      border: 1px solid #e2e8f0;
      text-decoration: none;
      color: #0f172a;
      font-weight: 800;
      transition: .2s ease;
    }

    .quick-link i {
      display: block;
      font-size: 24px;
      color: #2563eb;
      margin-bottom: 10px;
    }

    .quick-link:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, .08);
    }

    html[data-theme="dark"] .not-found-page {
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .34), transparent 36%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, .16), transparent 35%),
        linear-gradient(180deg, #08101f 0%, #0d1424 52%, #090f1c 100%);
      color: #edf4ff;
    }

    html[data-theme="dark"] .not-found-card {
      background: linear-gradient(180deg, rgba(17, 26, 45, .96), rgba(13, 22, 39, .93));
      border-color: rgba(148, 163, 184, .24);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .36);
      color: #edf4ff;
    }

    html[data-theme="dark"] .not-found-card::before {
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, .18), transparent 38%),
        linear-gradient(135deg, rgba(37, 99, 235, .10), transparent 48%);
    }

    html[data-theme="dark"] .not-found-title,
    html[data-theme="dark"] .quick-links-title {
      color: #f7fbff;
    }

    html[data-theme="dark"] .not-found-desc {
      color: #b8c7dd;
    }

    html[data-theme="dark"] .not-found-code {
      background: linear-gradient(135deg, #93c5fd, #38bdf8 52%, #fde68a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 18px 34px rgba(14, 165, 233, .14));
    }

    html[data-theme="dark"] .not-found-icon {
      background: linear-gradient(135deg, #2f6df0, #0ea5e9);
      border: 1px solid rgba(147, 197, 253, .28);
      box-shadow: 0 18px 34px rgba(37, 99, 235, .34);
      color: #fff;
    }

    html[data-theme="dark"] .not-found-search {
      background: rgba(139, 183, 255, .10);
      border-color: rgba(139, 183, 255, .25);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    html[data-theme="dark"] .not-found-search input {
      color: #edf4ff;
    }

    html[data-theme="dark"] .not-found-search input::placeholder {
      color: #8191a8;
    }

    html[data-theme="dark"] .not-found-search button {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #111827;
    }

    html[data-theme="dark"] .nf-btn-primary {
      background: linear-gradient(135deg, #2f6df0, #1d4ed8);
      border: 1px solid rgba(147, 197, 253, .28);
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, .28);
    }

    html[data-theme="dark"] .nf-btn-secondary,
    html[data-theme="dark"] .quick-link {
      background: rgba(139, 183, 255, .10);
      border-color: rgba(139, 183, 255, .25);
      color: #dbeafe;
    }

    html[data-theme="dark"] .quick-link i {
      color: #93c5fd;
    }

    html[data-theme="dark"] .nf-btn-secondary:hover,
    html[data-theme="dark"] .quick-link:hover {
      border-color: rgba(147, 197, 253, .46);
      background: rgba(139, 183, 255, .14);
      box-shadow: 0 14px 28px rgba(0, 0, 0, .24);
    }

    @keyframes floatIcon {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @media (max-width: 768px) {
      .not-found-page {
        padding: 34px 0;
        align-items: flex-start;
      }

      .not-found-card {
        border-radius: 26px;
        padding: 38px 20px;
      }

      .not-found-code {
        letter-spacing: -4px;
      }

      .not-found-desc {
        font-size: 15px;
      }

      .not-found-search {
        border-radius: 22px;
      }

      .quick-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 420px) {
      .not-found-actions {
        flex-direction: column;
      }

      .nf-btn {
        justify-content: center;
        width: 100%;
      }

      .quick-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
    <header class="site-header">
      <div data-component="navbar"></div>
  </header>

  <main class="not-found-page">
    <section class="container">
      <div class="not-found-card">
        <div class="not-found-content">
          <div class="not-found-icon">
            <i class="fa-solid fa-compass"></i>
          </div>

          <p class="not-found-code">404</p>

          <h1 class="not-found-title">Halaman Hilang Nih!</h1>

          <p class="not-found-desc">
            Sepertinya kamu nyasar. Halaman yang kamu cari mungkin sudah dipindahkan,
            dihapus, atau alamatnya salah ketik. Tenang, kamu masih bisa lanjut cari
            informasi lain di SA UPI.
          </p>

          <form class="not-found-search" action="search.html" method="GET">
            <input
              type="search"
              name="q"
              placeholder="Cari jurusan, lowongan, dokumen, atau info kampus..."
              aria-label="Cari konten"
            />
            <button type="submit" aria-label="Cari">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </form>

          <div class="not-found-actions">
            <a href="index.html" class="nf-btn nf-btn-primary">
              <i class="fa-solid fa-house"></i>
              Kembali ke Beranda
            </a>

            <a href="search.html" class="nf-btn nf-btn-secondary">
              <i class="fa-solid fa-magnifying-glass"></i>
              Cari Konten
            </a>
          </div>

          <p class="quick-links-title">Atau langsung buka halaman penting</p>

          <div class="quick-links">
            <a href="jurusan.html" class="quick-link">
              <i class="fa-solid fa-graduation-cap"></i>
              Jurusan
            </a>

            <a href="lowongan.html" class="quick-link">
              <i class="fa-solid fa-briefcase"></i>
              Lowongan
            </a>

            <a href="dokumen.html" class="quick-link">
              <i class="fa-solid fa-file-lines"></i>
              Dokumen
            </a>

            <a href="faq.html" class="quick-link">
              <i class="fa-solid fa-circle-question"></i>
              FAQ
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/menu.js"></script>
  <script src="assets/js/components.js"></script>
</body>
</html>
